<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChapaVote — Cooperados</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:        #00C271;
      --verde-escuro: #009958;
      --verde-glow:   rgba(0,194,113,0.12);
      --vermelho:     #FF4C4C;
      --amarelo:      #FFB800;
      --azul:         #4A90D9;
      --bg:           #060C12;
      --sidebar:      #080E16;
      --card:         #0C1720;
      --borda:        rgba(255,255,255,0.06);
      --texto:        #DCE8E0;
      --muted:        #4A6A58;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: var(--sidebar);
      border-right: 1px solid var(--borda);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 20;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 28px;
      border-bottom: 1px solid var(--borda);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--verde);
      text-decoration: none;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .sidebar-logo span { color: var(--verde); }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--verde), var(--verde-escuro));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 16px; height: 16px; }

    nav {
      flex: 1;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 8px 4px;
      margin-top: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: all 0.15s;
      text-decoration: none;
    }

    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--texto); }
    .nav-item.ativo { background: var(--verde-glow); color: var(--verde); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-bottom {
      padding: 16px 12px;
      border-top: 1px solid var(--borda);
    }

    .admin-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .admin-avatar {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--verde), var(--verde-escuro));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
    }

    .admin-info { flex: 1; min-width: 0; }
    .admin-nome { font-size: 12px; font-weight: 500; color: var(--texto); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-role { font-size: 10px; color: var(--verde); }

    .btn-sair {
      width: 100%;
      background: transparent;
      border: 1px solid var(--borda);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-sair:hover { color: var(--texto); background: rgba(255,255,255,0.04); }

    /* MAIN */
    .main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--borda);
      background: rgba(6,12,18,0.9);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-titulo {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .total-badge {
      background: var(--verde-glow);
      border: 1px solid rgba(0,194,113,0.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--verde);
      font-weight: 600;
    }

    .content {
      padding: 24px 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* KPI MINI */
    .kpi-mini {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .kpi-mini-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .kpi-mini-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .kpi-mini-card.todos::after    { background: rgba(255,255,255,0.1); }
    .kpi-mini-card.votou::after    { background: var(--verde); }
    .kpi-mini-card.nao-votou::after { background: var(--amarelo); }
    .kpi-mini-card.nao-acessou::after { background: var(--muted); }

    .kpi-mini-card:hover, .kpi-mini-card.ativo { border-color: rgba(255,255,255,0.15); }
    .kpi-mini-card.ativo.votou    { border-color: var(--verde); background: rgba(0,194,113,0.05); }
    .kpi-mini-card.ativo.nao-votou { border-color: var(--amarelo); background: rgba(255,184,0,0.05); }
    .kpi-mini-card.ativo.nao-acessou { border-color: var(--muted); }

    .kmi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
    .kmi-num {
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 800;
    }

    .kpi-mini-card.todos .kmi-num    { color: var(--texto); }
    .kpi-mini-card.votou .kmi-num    { color: var(--verde); }
    .kpi-mini-card.nao-votou .kmi-num { color: var(--amarelo); }
    .kpi-mini-card.nao-acessou .kmi-num { color: var(--muted); }

    .kmi-pct { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* FILTROS */
    .filtros {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .busca-input {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 240px;
      transition: border-color 0.2s;
    }

    .busca-input:focus { border-color: var(--verde); }
    .busca-input::placeholder { color: var(--muted); }

    .select-filtro {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .select-filtro:focus { border-color: var(--verde); }

    .filtros-right {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    /* TABELA */
    .tabela-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 14px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 11px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--borda);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover { color: var(--texto); }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    tbody td {
      padding: 11px 20px;
      font-size: 13px;
    }

    .td-nome { font-weight: 500; color: var(--texto); }
    .td-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge.votou      { background: rgba(0,194,113,0.12); color: var(--verde); }
    .status-badge.nao-votou  { background: rgba(255,184,0,0.12);  color: var(--amarelo); }
    .status-badge.nao-acessou { background: rgba(255,255,255,0.05); color: var(--muted); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .votou .status-dot      { background: var(--verde); }
    .nao-votou .status-dot  { background: var(--amarelo); }
    .nao-acessou .status-dot { background: var(--muted); }

    /* PAGINAÇÃO */
    .paginacao {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--borda);
      font-size: 12px;
      color: var(--muted);
    }

    .pag-btns {
      display: flex;
      gap: 4px;
    }

    .pag-btn {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid var(--borda);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .pag-btn:hover { background: rgba(255,255,255,0.04); color: var(--texto); }
    .pag-btn.ativo { background: var(--verde-glow); border-color: var(--verde); color: var(--verde); font-weight: 600; }
    .pag-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* LOADING */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(0,194,113,0.15);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 13px;
    }

    .hamburger {
      display: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--texto);
      padding: 7px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 15;
    }

    .overlay.visivel { display: block; }

    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 25;
      }

      .sidebar.aberta { transform: translateX(0); }

      .main { margin-left: 0; }

      .kpi-mini { grid-template-columns: 1fr 1fr; }

      .filtros { flex-direction: column; }

      .busca-input, .select-filtro { width: 100%; }

      .filtros-right { margin-left: 0; }

      .content { padding: 16px 12px 40px; }

      .topbar { padding: 14px 16px; }

      table { font-size: 11px; }
      thead th, tbody td { padding: 8px 10px; }

      .total-badge { font-size: 11px; padding: 4px 10px; }
    }

    @media (max-width: 768px) {
      .col-email,
      .col-especialidade,
      .col-cidade { display: none; }

      tbody td.col-email,
      tbody td.col-especialidade,
      tbody td.col-cidade { display: none; }
    }
  </style>
</head>

<div class="main">
  <div class="topbar">
    <div class="topbar-titulo">Cooperados</div>
    <div class="topbar-right">
      <button class="hamburger" onclick="toggleMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>

        <div class="kmi-label">Acessaram mas não votaram</div>

        <option value="">Todas as cidades</option>
      </select>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://xgpnhlvgdcdlmsqzlbvc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhncG5obHZnZGNkbG1zcXpsYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTMyMjMsImV4cCI6MjA5MDM2OTIyM30.5I7nPUbSDKmjt-AqZb_gc4YV5_sndb5e5b0LA5XlW1E';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let todosCooperados = [];
  let votosMap = new Map();        // cooperado_id -> opcao real do voto
  let sessoesSet = new Set();
  let filtroStatusAtual = 'todos';
  let paginaAtual = 1;
  const POR_PAGINA = 50;

  function semanaAtual() {
    const d = new Date();
    const start = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: coop } = await sb.from('cooperados').select('nome, role').eq('id', session.user.id).single();
    if (!coop || coop.role !== 'admin') { window.location.href = 'voto.html'; return; }

    document.getElementById('adminNome').textContent = coop.nome;
    document.getElementById('adminAvatar').textContent = coop.nome.charAt(0).toUpperCase();

    await carregarDados();
  }

  async function carregarDados() {
    // Carrega cooperados (todos, paginado internamente pelo Supabase)
    let allCooperados = [];
    let from = 0;
    const step = 1000;

    while (true) {
      const { data, error } = await sb
        .from('cooperados')
        .select('id, nome, email, especialidade, cidade, local_atuacao, role, ativo')
        .eq('role', 'cooperado')
        .range(from, from + step - 1)
        .order('nome');

      if (error || !data || data.length === 0) break;
      allCooperados = allCooperados.concat(data);
      if (data.length < step) break;
      from += step;
    }

    todosCooperados = allCooperados;

    // Carrega votos desta semana com a opção real
    const { data: votos } = await sb
      .from('votos')
      .select('cooperado_id, opcao')
      .eq('semana', semanaAtual());

    if (votos) votos.forEach(v => votosMap.set(v.cooperado_id, v.opcao));

    // Popula filtros
    const cidades = [...new Set(allCooperados.map(c => c.cidade).filter(Boolean).sort())];
    const especialidades = [...new Set(allCooperados.map(c => c.especialidade).filter(Boolean).sort())];

    const selCidade = document.getElementById('filtroCidade');
    cidades.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      selCidade.appendChild(opt);
    });

    const selEsp = document.getElementById('filtroEspecialidade');
    especialidades.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e; opt.textContent = e;
      selEsp.appendChild(opt);
    });

    atualizarKPIs();
    aplicarFiltros();
  }

  function getStatus(cooperado) {
    if (votosMap.has(cooperado.id)) return 'votou';
    return 'nao-acessou';
  }

  function atualizarKPIs() {
    const total = todosCooperados.length;
    const votou = todosCooperados.filter(c => votosMap.has(c.id)).length;
    const naoAcessou = total - votou;
    const naoVotou = 0;

    const pct = (n) => total > 0 ? Math.round((n/total)*100) + '%' : '0%';

    document.getElementById('kmiTotal').textContent       = total.toLocaleString('pt-BR');
    document.getElementById('kmiVotou').textContent       = votou.toLocaleString('pt-BR');
    document.getElementById('kmiVotouPct').textContent    = pct(votou);
    document.getElementById('kmiNaoVotou').textContent    = naoVotou;
    document.getElementById('kmiNaoVotouPct').textContent = pct(naoVotou);
    document.getElementById('kmiNaoAcessou').textContent  = naoAcessou.toLocaleString('pt-BR');
    document.getElementById('kmiNaoAcessouPct').textContent = pct(naoAcessou);
    document.getElementById('totalBadge').textContent     = `${total.toLocaleString('pt-BR')} cooperados`;
  }

  function filtrarStatus(status, el) {
    filtroStatusAtual = status;
    paginaAtual = 1;
    document.querySelectorAll('.kpi-mini-card').forEach(c => c.classList.remove('ativo'));
    el.classList.add('ativo');
    aplicarFiltros();
  }

  function aplicarFiltros() {
    const busca = document.getElementById('buscaInput').value.toLowerCase();
    const cidade = document.getElementById('filtroCidade').value;
    const esp = document.getElementById('filtroEspecialidade').value;

    let filtrado = todosCooperados.filter(c => {
      const matchBusca = !busca ||
        (c.nome || '').toLowerCase().includes(busca) ||
        (c.email || '').toLowerCase().includes(busca);
      const matchCidade = !cidade || c.cidade === cidade;
      const matchEsp = !esp || c.especialidade === esp;

      let matchStatus = true;
      if (filtroStatusAtual === 'votou')       matchStatus = votosMap.has(c.id);
      if (filtroStatusAtual === 'nao-acessou') matchStatus = !votosMap.has(c.id);
      if (filtroStatusAtual === 'nao-votou')   matchStatus = false;

      return matchBusca && matchCidade && matchEsp && matchStatus;
    });

    document.getElementById('filtrosInfo').textContent = `${filtrado.length.toLocaleString('pt-BR')} resultado${filtrado.length !== 1 ? 's' : ''}`;
    renderTabela(filtrado);
  }

  function renderTabela(dados) {
    const container = document.getElementById('tabelaContainer');
    const paginacao = document.getElementById('paginacao');

    if (!dados.length) {
      container.innerHTML = '<div class="empty">Nenhum cooperado encontrado.</div>';
      paginacao.style.display = 'none';
      return;
    }

    const totalPags = Math.ceil(dados.length / POR_PAGINA);
    if (paginaAtual > totalPags) paginaAtual = 1;

    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = dados.slice(inicio, inicio + POR_PAGINA);

    const statusLabel = {
      'votou':       ['votou', 'Votou'],
      'nao-votou':   ['nao-votou', 'Acessou, não votou'],
      'nao-acessou': ['nao-acessou', 'Não acessou']
    };

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th class="col-email">Email</th>
            <th class="col-especialidade">Especialidade</th>
            <th class="col-cidade">Cidade</th>
            <th>Status</th>
            <th>Voto</th>
          </tr>
        </thead>
        <tbody>
          ${pagina.map(c => {
            const status = getStatus(c);
            const [cls, label] = statusLabel[status];
            const opcao = votosMap.get(c.id);
            const coresVoto = {
              'Nosso':    'color:var(--verde);',
              'Oposição': 'color:var(--vermelho);',
              'Indeciso': 'color:var(--amarelo);'
            };
            const votoBadge = opcao
              ? `<span style="${coresVoto[opcao] || ''}font-weight:600;font-size:12px;">${opcao}</span>`
              : '<span style="color:var(--muted);font-size:12px;">—</span>';
            return `
              <tr>
                <td>
                  <div class="td-nome">${c.nome || '—'}</div>
                  <div class="td-sub">${c.local_atuacao || ''}</div>
                </td>
                <td class="col-email" style="color:var(--muted);font-size:12px;">${c.email}</td>
                <td class="col-especialidade" style="font-size:12px;">${c.especialidade || '—'}</td>
                <td class="col-cidade" style="font-size:12px;">${c.cidade || '—'}</td>
                <td>
                  <span class="status-badge ${cls}">
                    <span class="status-dot"></span>
                    ${label}
                  </span>
                </td>
                <td>${votoBadge}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;

    // Paginação
    paginacao.style.display = 'flex';
    document.getElementById('paginacaoInfo').textContent =
      `Mostrando ${inicio + 1}–${Math.min(inicio + POR_PAGINA, dados.length)} de ${dados.length.toLocaleString('pt-BR')}`;

    const btns = document.getElementById('paginacaoBtns');
    btns.innerHTML = '';

    const addBtn = (label, pagina, desativado = false, ativo = false) => {
      const b = document.createElement('button');
      b.className = 'pag-btn' + (ativo ? ' ativo' : '');
      b.textContent = label;
      b.disabled = desativado;
      b.onclick = () => { paginaAtual = pagina; renderTabela(dados); window.scrollTo(0,0); };
      btns.appendChild(b);
    };

    addBtn('‹', paginaAtual - 1, paginaAtual === 1);

    const range = [];
    for (let p = Math.max(1, paginaAtual - 2); p <= Math.min(totalPags, paginaAtual + 2); p++) range.push(p);
    range.forEach(p => addBtn(p, p, false, p === paginaAtual));

    addBtn('›', paginaAtual + 1, paginaAtual === totalPags);
  }

  async function sair() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  init();

  function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('aberta');
    document.getElementById('overlay').classList.toggle('visivel');
  }

  function fecharMenu() {
    document.querySelector('.sidebar').classList.remove('aberta');
    document.getElementById('overlay').classList.remove('visivel');
  }
</script>
</body>
</html>
